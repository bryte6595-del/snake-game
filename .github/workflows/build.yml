name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install buildozer cython
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Build APK
        run: |
          buildozer init
          sed -i "s/title = My Application/title = Snake Game/" buildozer.spec
          sed -i "s/package.name = myapp/package.name = snakegame/" buildozer.spec
          sed -i "s/package.domain = org.test/package.domain = org.bryte/" buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-apk
          path: bin/*.apk
